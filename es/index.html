<script>
document.addEventListener('keydown', function(event) {
    const video = document.getElementById('miVideo');

    // 1. Verificación de seguridad: Si el video no existe, no hagas nada.
    if (!video) return;

    // Convertimos la tecla a minúscula una sola vez para ahorrar recursos
    const key = event.key.toLowerCase();

    // 'k' para Play/Pausa
    if (key === 'k') {
        if (video.paused) {
            video.play();
        } else {
            video.pause();
        }
    }

    // 'm' para Mutear/Desmutear
    if (key === 'm') {
        video.muted = !video.muted;
    }

    // 'Ctrl + Q' para Pantalla Completa
    // IMPORTANTE: Algunos navegadores bloquean 'Ctrl + Q' porque es un atajo del sistema.
    if (event.ctrlKey && key === 'q') {
        event.preventDefault(); 
        
        if (!document.fullscreenElement) {
            // Usamos el contenedor del video si quieres que los controles se vean en grande
            video.requestFullscreen().catch(err => {
                console.error(`Error: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }
});
</script>
